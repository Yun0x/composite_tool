<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #eef3fb;
            color: #172033;
        }

        .login-box {
            width: 100%;
            max-width: 390px;
            padding: 34px 32px 30px;
            border: 1px solid #dce4f0;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        }

        .login-header {
            margin-bottom: 26px;
            text-align: center;
        }

        .login-icon {
            width: 50px;
            height: 50px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            border-radius: 16px;
            background: #eff6ff;
            color: #2563eb;
        }

        .login-icon svg {
            width: 26px;
            height: 26px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.3;
        }

        .login-tip {
            margin: 0;
            color: #667085;
            font-size: 14px;
        }

        label {
            display: block;
            margin: 16px 0 8px;
            color: #344054;
            font-size: 14px;
            font-weight: 700;
        }

        .field-wrap {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            width: 18px;
            height: 18px;
            transform: translateY(-50%);
            color: #98a2b3;
            pointer-events: none;
        }

        input {
            width: 100%;
            height: 46px;
            padding: 0 14px 0 42px;
            border: 1px solid #cfd8e6;
            border-radius: 12px;
            outline: none;
            background: #ffffff;
            color: #172033;
            font-size: 14px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        input::placeholder {
            color: #a8b2c1;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        input:focus + .field-icon {
            color: #2563eb;
        }

        button {
            position: relative;
            width: 100%;
            height: 46px;
            margin-top: 22px;
            border: 0;
            border-radius: 12px;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 22px rgba(37, 99, 235, 0.22);
            transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
        }

        button:hover:not(:disabled) {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 15px 26px rgba(37, 99, 235, 0.28);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .button-loading::after {
            content: "";
            position: absolute;
            right: 18px;
            top: 50%;
            width: 15px;
            height: 15px;
            margin-top: -7.5px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .error {
            display: none;
            margin-top: 14px;
            padding: 10px 12px;
            border: 1px solid rgba(220, 38, 38, 0.18);
            border-radius: 10px;
            background: #fef2f2;
            color: #dc2626;
            font-size: 13px;
            line-height: 1.5;
        }

        .error:not(:empty) {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding: 48px 16px 24px;
                background: #ffffff;
            }

            .login-box {
                max-width: none;
                padding: 0;
                border: 0;
                border-radius: 0;
                box-shadow: none;
            }

            .login-header {
                margin-bottom: 28px;
            }

            .login-icon {
                width: 48px;
                height: 48px;
            }

            h1 {
                font-size: 23px;
            }

            input,
            button {
                height: 48px;
                border-radius: 11px;
                font-size: 15px;
            }

            label {
                margin-top: 18px;
            }
        }

        @media (min-width: 481px) and (max-width: 820px) {
            body {
                padding: 28px 18px;
            }

            .login-box {
                max-width: 420px;
            }
        }
    </style>
</head>
<body>
<main class="login-box">
    <div class="login-header">
        <div class="login-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M6.5 11h11A1.5 1.5 0 0 1 19 12.5v6A1.5 1.5 0 0 1 17.5 20h-11A1.5 1.5 0 0 1 5 18.5v-6A1.5 1.5 0 0 1 6.5 11Z" stroke="currentColor" stroke-width="2"/>
                <path d="M12 15v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>欢迎登录</h1>
        <p class="login-tip">请输入账号和密码继续访问</p>
    </div>

    <form id="loginForm">
        <label for="username">账号</label>
        <div class="field-wrap">
            <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入账号">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z" stroke="currentColor" stroke-width="2"/>
            </svg>
        </div>

        <label for="password">密码</label>
        <div class="field-wrap">
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M6.5 10h11A1.5 1.5 0 0 1 19 11.5v7A1.5 1.5 0 0 1 17.5 20h-11A1.5 1.5 0 0 1 5 18.5v-7A1.5 1.5 0 0 1 6.5 10Z" stroke="currentColor" stroke-width="2"/>
            </svg>
        </div>

        <button id="loginButton" type="submit">登录</button>
        <div id="errorBox" class="error"></div>
    </form>
</main>

<script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('loginButton');
    const errorBox = document.getElementById('errorBox');
    const originalButtonText = loginButton.textContent;

    loginForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        errorBox.textContent = '';

        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (!username || !password) {
            errorBox.textContent = '请输入账号和密码';
            return;
        }

        loginButton.disabled = true;
        loginButton.textContent = '登录中';
        loginButton.classList.add('button-loading');

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });
            const data = await response.json();

            if (data && data.code === 200 && data.url) {
                const token = data.token || data.url.substring(data.url.lastIndexOf('/') + 1);
                try {
                    localStorage.setItem('toolLoginToken', token);
                } catch (error) {
                    errorBox.textContent = '浏览器无法保存登录状态';
                    return;
                }
                window.location.href = data.url;
                return;
            }
            errorBox.textContent = (data && data.msg) || '登录失败';
        } catch (error) {
            errorBox.textContent = '请求失败，请稍后重试';
        } finally {
            loginButton.disabled = false;
            loginButton.textContent = originalButtonText;
            loginButton.classList.remove('button-loading');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DTX 工具集</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
        }

        .wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 40px 20px;
        }

        .container {
            flex: 1 1 300px;
            max-width: 800px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            padding: 30px 40px;
            text-align: center;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .container:hover {
            transform: translateY(-4px);
        }

        h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 20px;
        }

        .dropzone {
            padding: 50px 10px;
            border: 3px dashed #2196F3;
            border-radius: 16px;
            color: #666;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            background: #f9fbff;
        }

        .dropzone.disabled {
            background: #f0f0f0;
            border-color: #ccc;
            color: #aaa;
            cursor: not-allowed;
        }

        .dropzone.dragover {
            background: #e3f2fd;
            border-color: #1976d2;
            color: #1565c0;
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        .dropzone::after {
            content: "🎵";
            font-size: 2rem;
            position: absolute;
            top: 10px;
            right: 10px;
            opacity: 0.2;
        }

        .dropzone.dragover::after {
            opacity: 0.5;
        }

        input[type="file"] {
            display: none;
        }

        label {
            font-weight: 500;
            color: #333;
            text-align: left;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }

        .progressContainer {
            width: 100%;
            height: 28px;
            background: #eee;
            border-radius: 14px;
            overflow: hidden;
            display: none;
        }

        .progressBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2196F3, #1565c0);
            transition: width 0.25s ease-in-out;
        }

        .progressText, .statusText {
            font-size: 0.9rem;
            color: #333;
        }
    </style>
</head>
<body>
<div class="wrapper">

    <div class="container" data-type="diff" style="background: rgba(255,41,41,0.1)">
        <h1>DTX 生成不同难度</h1>
        <div class="dropzone">点击或拖拽上传 DTX 文件</div>
        <input type="file" class="fileInput" accept=".dtx" multiple>
        <label>输出路径：</label>
        <input type="text" class="outPath" value="C:\Users\Admin\Desktop\TestSong\new_output\自制\检查">
        <div class="progressContainer">
            <div class="progressBar"></div>
        </div>
        <div class="progressText"></div>
        <div class="statusText"></div>
    </div>

    <div class="container" data-type="bin" style="background: rgba(45,255,58,0.1)">
        <h1>DTX 转 BIN 工具</h1>
        <div class="dropzone">点击或拖拽上传 DTX 文件</div>
        <input type="file" class="fileInput" accept=".dtx" multiple>
        <label>输出路径：</label>
        <input type="text" class="outPath" value="C:\Users\Admin\Desktop\TestSong\new_output\自制\检查">
        <div class="progressContainer">
            <div class="progressBar"></div>
        </div>
        <div class="progressText"></div>
        <div class="statusText"></div>
    </div>

    <div class="container" data-type="decompile" style="background: rgba(255,206,0,0.1)">
        <h1>Bin 反编译工具</h1>
        <div class="dropzone">点击或拖拽上传 Bin 文件</div>
        <input type="file" class="fileInput" accept=".bin" multiple>
        <label>输出路径：</label>
        <input type="text" class="outPath" value="C:\Users\Admin\Desktop\TestSong\new_output\自制\检查">
        <div class="progressContainer">
            <div class="progressBar"></div>
        </div>
        <div class="progressText"></div>
        <div class="statusText"></div>
    </div>
    <div class="container" data-type="upload" style="background: rgba(41,216,255,0.1)">
        <h1>DTX一键生成</h1>
        <div class="dropzone">上传初始dtx生成全套dtx、bin、excel、txt内容</div>
        <input type="file" class="fileInput" accept=".dtx" multiple>
        <label>输出路径：</label>
        <input type="text" class="outPath" value="C:\Users\Admin\Desktop\TestSong\new_output\自制\output">
        <div class="progressContainer">
            <div class="progressBar"></div>
        </div>
        <div class="progressText"></div>
        <div class="statusText"></div>
    </div>
</div>
<script>
    document.querySelectorAll('.container').forEach(container => {
        const dropzone = container.querySelector('.dropzone');
        const fileInput = container.querySelector('.fileInput');
        const progressContainer = container.querySelector('.progressContainer');
        const progressBar = container.querySelector('.progressBar');
        const progressText = container.querySelector('.progressText');
        const statusText = container.querySelector('.statusText');
        const outPathInput = container.querySelector('.outPath');
        const type = container.dataset.type;
        let uploading = false;
        function setDropzoneDisabled(state) {
            uploading = state;
            dropzone.classList.toggle('disabled', state);
        }
        dropzone.addEventListener('dragover', e => {
            e.preventDefault();
            if (!uploading) dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (!uploading) handleFiles([...e.dataTransfer.files]);
        });
        dropzone.addEventListener('click', () => {
            if (!uploading) fileInput.click();
        });
        fileInput.addEventListener('change', e => {
            if (!uploading) handleFiles([...e.target.files]);
            fileInput.value = "";
        });
        function uploadSingleFile(file, outPath, index, total, callback) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("outPutPath", outPath);
            formData.append("type", type);
            let url;
            if (type === "bin") {
                url = "http://localhost:9001/tool/uploadDtx";
            } else if (type === "diff") {
                url = "http://localhost:9001/tool/genDiffAndEasy";
            } else if (type === "decompile") {
                url = "http://localhost:9001/tool/decompileBin";
            } else if (type === "upload") {
                url = "http://localhost:9001/tool/convertDtx";
            }
            const xhr = new XMLHttpRequest();
            xhr.open("POST", url, true);
            xhr.upload.onprogress = function (e) {
                if (e.lengthComputable) {
                    const base = index / total * 100;
                    const percent = base + (e.loaded / e.total) * (100 / total);
                    progressBar.style.width = percent.toFixed(1) + "%";
                    progressText.textContent = percent.toFixed(1) + "%";
                }
            };
            xhr.onload = callback;
            xhr.onerror = function () {
                statusText.textContent = `❌ 上传失败：${file.name}`;
                callback();
            };

            xhr.send(formData);
        }

        function handleFiles(files) {
            const filteredFiles = files.filter(f => {
                if (type === "decompile") return f.name.toLowerCase().endsWith('.bin');
                return f.name.toLowerCase().endsWith('.dtx');
            });
            if (filteredFiles.length === 0) {
                alert(type === "decompile" ? '请选择 .BIN 文件' : '请选择 .DTX 文件');
                return;
            }

            const outPath = outPathInput.value.trim();
            if (!outPath) {
                alert('请填写输出路径');
                return;
            }

            setDropzoneDisabled(true);
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressText.textContent = '0%';
            statusText.textContent = `准备上传 ${filteredFiles.length} 个文件...`;

            let index = 0;

            function uploadNext() {
                if (index >= filteredFiles.length) {
                    statusText.textContent = `✅ 全部 ${filteredFiles.length} 个文件完成`;
                    setDropzoneDisabled(false);
                    return;
                }
                const file = filteredFiles[index];
                statusText.textContent = `正在上传 (${index + 1}/${filteredFiles.length})：${file.name}`;
                uploadSingleFile(file, outPath, index, filteredFiles.length, () => {
                    index++;
                    uploadNext();
                });
            }

            uploadNext();
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键化全流程处理</title>
    <style>
        :root {
            --primary: #ceb9ff;
            --primary-hover: #f1e9ff;
            --bg: #f5f9ff;
            --card-bg: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.1);
            --text-main: #111827;
            --text-dim: #4b5563;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #facc15;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .glass-card {
            width: 100%;
            max-width: 900px; /* 增加最大宽度 */
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            max-height: 95vh;
        }

        header { text-align: center; margin-bottom: 20px; flex-shrink: 0; }
        header h1 { font-size: 20px; font-weight: 700; color: white; }
        header p { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

        /* 统一上传区域 */
        .drop-zone {
            border: 2px dashed #475569;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.4);
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
        }

        .drop-zone svg {
            width: 32px;
            height: 32px;
            fill: var(--primary);
            margin-bottom: 8px;
        }

        .file-hint { font-size: 12px; color: var(--text-dim); }

        /* 参数设置表单 */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group.full { grid-column: span 2; }

        label { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }

        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 13px;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        /* 配对列表区域 */
        .queue-header {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .queue-list {
            flex-grow: 1;
            overflow-y: auto;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            min-height: 100px;
        }

        .queue-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            transition: background 0.2s;
        }

        .queue-item:last-child { border-bottom: none; }
        .queue-item:hover { background: rgba(255, 255, 255, 0.05); }

        .file-info { display: flex; flex-direction: column; gap: 2px; }
        .file-name { font-weight: 500; color: #fff; }
        .file-match { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            min-width: 60px;
            text-align: center;
        }

        .status-badge.ready { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .status-badge.warning { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .status-badge.success { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .status-badge.error { background: rgba(244, 63, 94, 0.2); color: #fb7185; }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        /* 滚动条 */
        .queue-list::-webkit-scrollbar { width: 4px; }
        .queue-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="glass-card">
    <header>
        <h1>MP3 + DTX 智能处理</h1>
        <p>自动根据文件名配对并批量上传</p>
    </header>

    <div class="drop-zone" id="dropZone">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <div style="font-weight: 600; margin-bottom: 4px;">点击或拖拽所有文件至此</div>
        <div class="file-hint">支持 MP3 和 DTX 混合上传，自动合并</div>
        <input type="file" id="fileInput" accept=".mp3,.dtx" multiple>
    </div>

    <div class="form-grid">
        <div class="input-group">
            <label>高潮起始 (秒)</label>
            <input type="number" id="startSecond" placeholder="0" min="0">
        </div>
        <div class="input-group">
            <label>高潮时长 (秒)</label>
            <input type="number" id="duration" placeholder="不截取" min="1">
        </div>
        <div class="input-group full">
            <label>输出目录</label>
            <input type="text" id="outputDir" placeholder="例如：C:\Users\Admin\Desktop\TestSong\正式歌曲"  value="C:\Users\Admin\Desktop\TestSong\正式歌曲">
        </div>
    </div>

    <div class="queue-header">
        <span>待处理队列</span>
        <span id="queueCount">0 组</span>
    </div>
    <div class="queue-list" id="queueList">
        <div style="padding: 20px; text-align: center; color: var(--text-dim); font-size: 12px;">
            请先选择文件
        </div>
    </div>

    <button id="submitBtn">开始批量处理</button>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const queueList = document.getElementById('queueList');
    const queueCount = document.getElementById('queueCount');
    const btn = document.getElementById('submitBtn');

    let processingQueue = []; // 存储配对好的对象 { mp3: File, dtx: File, id: string, status: string }

    // 1. 拖拽与选择逻辑
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files);
    };
    fileInput.onchange = (e) => handleFiles(e.target.files);

    // 2. 核心配对逻辑
    function handleFiles(fileList) {
        if (!fileList || fileList.length === 0) return;

        const files = Array.from(fileList);
        const mp3s = files.filter(f => f.name.toLowerCase().endsWith('.mp3'));
        const dtxs = files.filter(f => f.name.toLowerCase().endsWith('.dtx'));

        processingQueue = []; // 重置队列

        // 以 MP3 为主键进行遍历匹配
        mp3s.forEach(mp3 => {
            const baseName = mp3.name.substring(0, mp3.name.lastIndexOf('.'));
            // 寻找同名的 DTX (忽略大小写)
            const matchedDtx = dtxs.find(dtx => {
                const dtxBase = dtx.name.substring(0, dtx.name.lastIndexOf('.'));
                return dtxBase.toLowerCase() === baseName.toLowerCase();
            });

            processingQueue.push({
                id: Math.random().toString(36).substr(2, 9),
                mp3: mp3,
                dtx: matchedDtx || null, // 可能没找到
                status: matchedDtx ? 'ready' : 'missing'
            });
        });

        renderQueue();
    }

    // 3. 渲染列表
    function renderQueue() {
        queueCount.innerText = `${processingQueue.length} 组`;

        if (processingQueue.length === 0) {
            queueList.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-dim); font-size: 12px;">请先选择文件</div>';
            return;
        }

        queueList.innerHTML = '';
        processingQueue.forEach(item => {
            const div = document.createElement('div');
            div.className = 'queue-item';
            div.id = `item-${item.id}`;

            let statusBadge = '';
            let subText = '';

            if (item.status === 'ready') {
                statusBadge = `<span class="status-badge ready">就绪</span>`;
                subText = `<span style="color:#60a5fa">✔ 已匹配: ${item.dtx.name}</span>`;
            } else if (item.status === 'missing') {
                statusBadge = `<span class="status-badge warning">缺少DTX</span>`;
                subText = `<span style="color:#fb7185">✖ 未找到同名 DTX 文件</span>`;
            }

            div.innerHTML = `
                <div class="file-info">
                    <div class="file-name">${item.mp3.name}</div>
                    <div class="file-match">${subText}</div>
                </div>
                ${statusBadge}
            `;
            queueList.appendChild(div);
        });
    }

    // 4. 更新单行状态
    function updateItemStatus(id, type, msg) {
        const itemEl = document.getElementById(`item-${id}`);
        if (!itemEl) return;
        const badge = itemEl.querySelector('.status-badge');

        if (type === 'processing') {
            badge.className = 'status-badge ready';
            badge.innerText = '处理中...';
            badge.style.color = '#fff';
        } else if (type === 'success') {
            badge.className = 'status-badge success';
            badge.innerText = '成功';
        } else {
            badge.className = 'status-badge error';
            badge.innerText = msg || '失败';
        }
    }

    // 5. 提交处理
    btn.onclick = async () => {
        if (processingQueue.length === 0) {
            alert('请先添加文件');
            return;
        }

        // 检查是否有缺失 DTX 的项目
        const hasMissing = processingQueue.some(p => !p.dtx);
        if (hasMissing) {
            if (!confirm('部分 MP3 缺少对应的 DTX 文件，这些文件将被跳过。是否继续？')) {
                return;
            }
        }

        const validItems = processingQueue.filter(p => p.dtx);
        if (validItems.length === 0) {
            alert('没有完整的配对文件可供处理');
            return;
        }

        const outputDir = document.getElementById('outputDir').value;
        const startSecond = document.getElementById('startSecond').value || 0;
        const duration = document.getElementById('duration').value || 0;

        btn.disabled = true;
        btn.innerText = '正在批量处理...';

        for (const item of validItems) {
            updateItemStatus(item.id, 'processing');

            const formData = new FormData();
            formData.append('file', item.mp3);
            formData.append('dtx', item.dtx);
            formData.append('outputDir', outputDir);
            formData.append('startSecond', startSecond);
            formData.append('duration', duration);

            try {
                const res = await fetch('http://localhost:9001/tool/fullProcess', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.code === 200) {
                    updateItemStatus(item.id, 'success');
                } else {
                    updateItemStatus(item.id, 'error', data.msg);
                }
            } catch (e) {
                updateItemStatus(item.id, 'error', '网络错误');
            }
        }

        btn.disabled = false;
        btn.innerText = '开始批量处理';
    };
</script>

</body>
</html>

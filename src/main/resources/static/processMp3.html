<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3处理工具</title>
    <style>
        :root {
            --primary: #ceb9ff;
            --primary-hover: #f1e9ff;
            --bg: #f5f9ff;
            --card-bg: rgb(128, 178, 255);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
        }


        .glass-card {
            width: 100%;
            max-width: 900px; /* 增加最大宽度 */
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px; /* 增大内边距 */
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.6);
        }

        header { text-align: center; margin-bottom: 36px; }
        header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        header p { font-size: 14px; color: var(--text-dim); margin-top: 6px; }

        .drop-zone {
            border: 2px dashed #283649;
            border-radius: 16px;
            padding: 60px 20px; /* 增大可点击区域 */
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.85);
            margin-bottom: 24px;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.07);
        }

        .drop-zone svg {
            width: 50px;
            height: 50px;
            fill: var(--text-dim);
            margin-bottom: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px; /* 增大间距 */
            margin-bottom: 24px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group.full { grid-column: span 2; }

        label { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }

        input {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: #ffffff;
            font-size: 15px;
            background: rgba(15, 23, 42, 0.6);
            transition: border 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 结果列表 */
        .result-area {
            margin-top: 28px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 14px;
            border-radius: 12px;
        }

        .status-item {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .success { color: #4ade80; font-weight: 600; }
        .error { color: #fb7185; font-weight: 600; }

        #fileInput { display: none; }

        @media (max-width: 500px) {
            .glass-card { padding: 32px 20px; width: 100%; }
            .form-grid { gap: 16px; }
            .drop-zone { padding: 50px 16px; }
        }
    </style>
</head>
<body>

<div class="glass-card">
    <header>
        <h1>MP3批量处理</h1>
        <p>批量压缩+截取</p>
    </header>

    <div class="drop-zone" id="dropZone">
        <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
        <div id="dropText">点击或拖拽 MP3 文件至此处</div>
        <input type="file" id="fileInput" accept=".mp3" multiple>
    </div>

    <div class="form-grid">
        <div class="input-group">
            <label>起始时间 (秒)</label>
            <input type="number" id="startSecond" placeholder="0" min="0">
        </div>
        <div class="input-group">
            <label>预览时长 (秒)</label>
            <input type="number" id="duration" placeholder="不截取" min="1">
        </div>
        <div class="input-group full">
            <label>输出目录</label>
            <input type="text" id="outputDir" placeholder="C:\Users\Admin\Desktop\TestSong\正式歌曲" value="D:\Document\drumFiles\正式歌曲">
        </div>
    </div>

    <button id="submitBtn">开始批量处理</button>

    <div id="resultArea" class="result-area"></div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const dropText = document.getElementById('dropText');
    const btn = document.getElementById('submitBtn');
    const resultArea = document.getElementById('resultArea');

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        fileInput.files = e.dataTransfer.files;
        updateFileStatus();
    };
    fileInput.onchange = () => updateFileStatus();

    function updateFileStatus() {
        const count = fileInput.files.length;
        dropText.innerHTML = count > 0 ? `已选择 ${count} 个音频文件` : `点击或拖拽 MP3 文件至此处`;
    }

    btn.onclick = async () => {
        const files = fileInput.files;
        if (!files.length) { alert('请先选择文件'); return; }

        const config = {
            start: document.getElementById('startSecond').value || 0,
            duration: document.getElementById('duration').value || 0,
            dir: document.getElementById('outputDir').value
        };

        btn.disabled = true;
        resultArea.innerHTML = '';

        for (const file of files) {
            const item = document.createElement('div');
            item.className = 'status-item';
            item.innerHTML = `<span>${file.name}</span><span style="color:var(--text-dim)">处理中...</span>`;
            resultArea.prepend(item);

            const formData = new FormData();
            formData.append('file', file);
            formData.append('startSecond', config.start);
            formData.append('duration', config.duration);
            formData.append('outputDir', config.dir);

            try {
                const res = await fetch('http://localhost:9001/tool/processMp3', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.code === 200) {
                    item.lastElementChild.innerHTML = '成功';
                    item.lastElementChild.className = 'success';
                } else {
                    item.lastElementChild.innerHTML = '失败';
                    item.lastElementChild.className = 'error';
                }
            } catch (e) {
                item.lastElementChild.innerHTML = '失败';
                item.lastElementChild.className = 'error';
            }
        }
        btn.disabled = false;
    };
</script>

</body>
</html>

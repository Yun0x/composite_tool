<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>终端控制台 - Pro Max Ultra</title>
    <style>
        :root {
            --primary-blue: #3b82f6;
            --primary-green: #10b981;
            --primary-purple: #8b5cf6;
            --primary-red: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* 极致背景：动画渐变网格 */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 动态背景修饰 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                    radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%),
                    radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.1) 0, transparent 50%),
                    radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.1) 0, transparent 50%);
            z-index: -1;
        }

        /* 环境切换器 */
        .env-header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        .env-switcher {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 6px;
            border-radius: 50px;
            display: flex;
            position: relative;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .env-switcher input { display: none; }
        .env-switcher label {
            padding: 10px 30px;
            cursor: pointer;
            z-index: 2;
            font-weight: bold;
            font-size: 14px;
            color: #64748b;
            transition: all 0.3s;
        }

        .env-slider {
            position: absolute;
            height: calc(100% - 12px);
            width: calc(50% - 6px);
            background: var(--primary-blue);
            border-radius: 50px;
            top: 6px; left: 6px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
        }

        #env_test:checked ~ .env-slider { transform: translateX(100%); background: var(--primary-green); }
        #env_test:checked ~ label[for="env_test"] { color: white; }
        #env_prod:checked ~ label[for="env_prod"] { color: white; }

        .api-badge {
            margin-top: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.05);
            padding: 5px 15px;
            border-radius: 20px;
            color: #475569;
        }

        /* 主容器布局 */
        .main-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        /* 炫技卡片设计 */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.15);
        }

        /* 悬浮时的流光边框效果 */
        .card::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--primary-color, #3b82f6), transparent 30%);
            animation: rotate 4s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }
        .card:hover::after { opacity: 0.2; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .card h2 {
            margin: 0 0 25px 0;
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 表单控件美化 */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], input[type="number"] {
            width: 90%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.5);
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        input:focus {
            outline: none;
            background: white;
            border-color: var(--theme-color, #3b82f6);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transform: scale(1.01);
        }

        /* 滑动选择器美化 */
        .pill-switcher {
            display: flex;
            background: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: 12px;
            position: relative;
        }
        .pill-switcher input { display: none; }
        .pill-switcher label {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            font-weight: bold;
            z-index: 2;
            cursor: pointer;
            transition: color 0.3s;
        }
        .pill-bar {
            position: absolute;
            height: calc(100% - 8px);
            width: calc(50% - 4px); /* 默认两档 */
            background: white;
            border-radius: 10px;
            top: 4px; left: 4px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 1;
        }

        /* 远程启动特定两档逻辑 */
        #rb_lvl1:checked ~ .pill-bar { transform: translateX(0); background: var(--primary-blue); }
        #rb_lvl2:checked ~ .pill-bar { transform: translateX(100%); background: var(--primary-blue); }
        .pill-switcher input:checked + label { color: white; }

        /* 自动运行三档逻辑 */
        .tri-bar { width: calc(33.33% - 4px) !important; }
        #mode_traffic:checked ~ .tri-bar { transform: translateX(0); background: var(--primary-purple); }
        #mode_off:checked ~ .tri-bar { transform: translateX(100%); background: var(--primary-red); }
        #mode_always:checked ~ .tri-bar { transform: translateX(200%); background: var(--primary-purple); }

        /* 动作按钮 */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            background: var(--theme-color, #3b82f6);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px rgba(0,0,0,0.2);
        }

        .btn:active { transform: translateY(1px) scale(0.98); }

        /* 阶段行 */
        .stage-box {
            background: rgba(255,255,255,0.4);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .stage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .stage-title { font-size: 14px; font-weight: 700; color: #1e293b; }

        /* 开关美化 */
        .ios-switch {
            width: 40px; height: 22px;
            background: #cbd5e1;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .ios-switch::after {
            content: "";
            position: absolute;
            width: 18px; height: 18px;
            background: white;
            border-radius: 50%;
            top: 2px; left: 2px;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        input:checked + .ios-switch { background: var(--primary-purple); }
        input:checked + .ios-switch::after { transform: translateX(18px); }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            transition: all 0.3s ease;
        }
        .inputs-grid.collapsed { max-height: 0; opacity: 0; overflow: hidden; }

        /* 通知样式 */
        #notify-box {
            position: fixed;
            top: 30px; right: 30px;
            z-index: 1000;
        }
        .toast {
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            animation: slideInRight 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            border-left: 4px solid var(--primary-green);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeInDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .main-container { grid-template-columns: 1fr; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

<div id="notify-box"></div>

<div class="env-header">
    <div class="env-switcher">
        <input type="radio" id="env_prod" name="env_select" value="prod" checked onchange="handleEnvChange()">
        <label for="env_prod">正式环境</label>
        <input type="radio" id="env_test" name="env_select" value="test" onchange="handleEnvChange()">
        <label for="env_test">测试环境</label>
        <div class="env-slider"></div>
    </div>
    <div id="api_url" class="api-badge">API: https://drum.nh-elec.cn/app/drum</div>
</div>

<div class="main-container">

    <div class="card" style="--theme-color: var(--primary-blue)">
        <h2>远程启动</h2>
        <div class="form-group">
            <label>机器编号</label>
            <input type="text" id="rb_machine" value="13600002">
        </div>
        <div class="form-group">
            <label>选择模式</label>
            <div class="pill-switcher">
                <input type="radio" id="rb_lvl1" name="rb_level" value="1" checked>
                <label for="rb_lvl1">打地鼠</label>
                <input type="radio" id="rb_lvl2" name="rb_level" value="2">
                <label for="rb_lvl2">专业模式</label>
                <div class="pill-bar"></div>
            </div>
        </div>
        <div class="form-group">
            <label>歌曲编号</label>
            <input type="number" id="rb_song" placeholder="例如: 101">
        </div>
        <button class="btn" onclick="callRemoteBoot()">启动任务</button>
    </div>

    <div class="card" style="--theme-color: var(--primary-green)">
        <h2>歌曲一整套下载</h2>
        <div class="form-group">
            <label>机器编号</label>
            <input type="text" id="dl_machine" value="13600002">
        </div>
        <div class="form-group" style="margin-top: 40px;">
            <label>歌曲编号</label>
            <input type="number" id="dl_song" placeholder="请输入歌曲 ID">
        </div>
        <div style="height: 60px;"></div> <button class="btn" onclick="callDownload()">发送下载指令</button>
    </div>

    <div class="card" style="--theme-color: var(--primary-purple)">
        <h2>快速配置</h2>
        <div class="form-group">
            <label>机器编号</label>
            <input type="text" id="cfg_machine" value="13600002">
        </div>
        <div class="form-group">
            <label>快捷预设</label>
            <div class="pill-switcher">
                <input type="radio" id="mode_traffic" name="quick_mode" value="traffic" checked onchange="applyPreset('traffic')">
                <label for="mode_traffic">引流</label>
                <input type="radio" id="mode_off" name="quick_mode" value="off" onchange="applyPreset('off')">
                <label for="mode_off">关闭</label>
                <input type="radio" id="mode_always" name="quick_mode" value="always" onchange="applyPreset('always')">
                <label for="mode_always">常亮</label>
                <div class="pill-bar tri-bar"></div>
            </div>
        </div>

        <div id="stages-container">
            <script>
                const STAGES = [
                    { id: 1, title: '第一阶段 (引流)', start: 1, end: 12, int: 1 },
                    { id: 2, title: '第二阶段 (引流)', start: 12, end: 23, int: 1 },
                    { id: 3, title: '第三阶段 (常亮)', start: 0, end: 0, int: 0 }
                ];
                STAGES.forEach(s => {
                    document.write(`
                        <div class="stage-box">
                            <div class="stage-header">
                                <span class="stage-title">${s.title}</span>
                                <input type="checkbox" id="sw_${s.id}" ${s.id < 3 ? 'checked' : ''} hidden onchange="syncUI(${s.id})">
                                <label for="sw_${s.id}" class="ios-switch"></label>
                            </div>
                            <div class="inputs-grid ${s.id === 3 ? 'collapsed' : ''}" id="grid_${s.id}">
                                <div><input type="number" id="ts_${s.id}" value="${s.start}"><div style="font-size:9px;text-align:center;color:#94a3b8">开始</div></div>
                                <div><input type="number" id="te_${s.id}" value="${s.end}"><div style="font-size:9px;text-align:center;color:#94a3b8">结束</div></div>
                                <div><input type="number" id="int_${s.id}" value="${s.int}"><div style="font-size:9px;text-align:center;color:#94a3b8">持续</div></div>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
        <button class="btn" onclick="callConfig()">保存自动化配置</button>
    </div>

</div>

<script>
    const ENDPOINTS = {
        prod: "https://drum.nh-elec.cn",
        test: "http://192.168.1.7:9090"
    };

    function getBase() {
        return ENDPOINTS[document.querySelector('input[name="env_select"]:checked').value];
    }

    function handleEnvChange() {
        const env = document.querySelector('input[name="env_select"]:checked').value;
        const apiDisplay = document.getElementById('api_url');
        const color = env === 'prod' ? '#3b82f6' : '#10b981';

        apiDisplay.innerText = `API: ${ENDPOINTS[env]}/app/drum`;
        document.body.style.backgroundColor = env === 'prod' ? '#f0f2f5' : '#f0fdf4';
        toast(`已切换至 ${env === 'prod' ? '正式' : '测试'} 环境`);
    }

    function formatSong(n) {
        return "S" + String(n || 0).padStart(5, '0');
    }

    // --- API 调用 ---

    async function callRemoteBoot() {
        const machine = document.getElementById('rb_machine').value;
        const level = document.querySelector('input[name="rb_level"]:checked').value;
        const song = document.getElementById('rb_song').value;

        if(!song) return toast("请输入歌曲编号", "error");

        const url = `${getBase()}/app/drum/remoteBoot?machineNo=${machine}&songNum=${formatSong(song)}&level=${level}`;
        doFetch(url);
    }

    async function callDownload() {
        const machine = document.getElementById('dl_machine').value;
        const song = document.getElementById('dl_song').value;

        if(!song) return toast("请输入歌曲编号", "error");

        // 按要求重写接口：app/song/sendDownload
        const url = `${getBase()}/app/song/sendDownload?machineNo=${machine}&songNum=${formatSong(song)}`;
        doFetch(url);
    }

    async function callConfig() {
        const machine = document.getElementById('cfg_machine').value;
        let params = `machineNo=${machine}`;
        for(let i=1; i<=3; i++) {
            const active = document.getElementById(`sw_${i}`).checked;
            const ts = active ? document.getElementById(`ts_${i}`).value : 0;
            const te = active ? document.getElementById(`te_${i}`).value : 0;
            const interval = active ? document.getElementById(`int_${i}`).value : 0;
            params += `&timeStart${i}=${ts}&timeEnd${i}=${te}&interval${i}=${interval}`;
        }
        const url = `${getBase()}/app/drum/setAutoRunConfig?${params}`;
        doFetch(url);
    }

    function doFetch(url) {
        console.log("Sending Request:", url);
        // 模拟成功并发送请求
        fetch(url, { mode: 'no-cors' }).then(() => {
            toast("指令已发出");
        }).catch(e => {
            toast("网络异常，请检查", "error");
        });
    }

    // --- UI 逻辑 ---

    function syncUI(id) {
        const grid = document.getElementById(`grid_${id}`);
        const checked = document.getElementById(`sw_${id}`).checked;
        checked ? grid.classList.remove('collapsed') : grid.classList.add('collapsed');
    }

    function applyPreset(mode) {
        const set = (id, s, e, i, active) => {
            document.getElementById(`sw_${id}`).checked = active;
            document.getElementById(`ts_${id}`).value = s;
            document.getElementById(`te_${id}`).value = e;
            document.getElementById(`int_${id}`).value = i;
            syncUI(id);
        };

        if(mode === 'traffic') {
            set(1, 1, 12, 1, true);
            set(2, 12, 23, 1, true);
            set(3, 0, 0, 0, false);
        } else if(mode === 'off') {
            set(1, 0, 0, 0, false);
            set(2, 0, 0, 0, false);
            set(3, 0, 0, 0, false);
        } else if(mode === 'always') {
            set(1, 0, 0, 0, false);
            set(2, 0, 0, 0, false);
            set(3, 1, 24, 0, true);
        }
    }

    function toast(msg, type = 'success') {
        const box = document.getElementById('notify-box');
        const el = document.createElement('div');
        el.className = 'toast';
        el.style.borderLeftColor = type === 'success' ? '#10b981' : '#ef4444';
        el.innerText = msg;
        box.appendChild(el);
        setTimeout(() => {
            el.style.animation = 'slideInRight 0.5s reverse forwards';
            setTimeout(() => el.remove(), 500);
        }, 2500);
    }
</script>

</body>
</html>

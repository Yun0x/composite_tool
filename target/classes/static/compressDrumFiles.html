<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼓机文件压缩复制</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --success: #16a34a;
            --error: #dc2626;
            --warning: #d97706;
            --info: #2563eb;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border: #e5e7eb;
            --bg: #f4f6fb;
            --card: #ffffff;
            --soft: #f9fafb;
            --shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background:
                    radial-gradient(circle at top left, rgba(79, 70, 229, 0.25), transparent 32%),
                    radial-gradient(circle at bottom right, rgba(147, 51, 234, 0.22), transparent 35%),
                    linear-gradient(135deg, #eef2ff 0%, #f8fafc 48%, #f5f3ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-main);
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 34px;
            backdrop-filter: blur(14px);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
        }

        .title-wrap {
            min-width: 0;
        }

        h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.2;
            letter-spacing: 1px;
            color: #111827;
        }

        .sub-title {
            margin: 8px 0 0;
            color: var(--text-sub);
            font-size: 14px;
        }

        .badge {
            flex-shrink: 0;
            padding: 9px 14px;
            border-radius: 999px;
            background: #eef2ff;
            color: var(--primary);
            font-size: 13px;
            font-weight: 700;
            border: 1px solid #e0e7ff;
        }

        .path-box {
            display: grid;
            grid-template-columns: 88px 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }

        .path-item {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 88px 1fr;
            align-items: center;
            gap: 12px;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--soft);
        }

        .path-label {
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 700;
        }

        .path-value {
            font-family: Consolas, "Microsoft YaHei", monospace;
            font-size: 14px;
            color: #374151;
            word-break: break-all;
        }

        .action-row {
            display: flex;
            gap: 14px;
            margin-top: 24px;
        }

        button {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 10px 22px rgba(79, 70, 229, 0.32);
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(79, 70, 229, 0.38);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.62;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result {
            display: none;
            margin-top: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #fff;
            overflow: hidden;
            animation: fadeIn 0.25s ease;
        }

        .result-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
        }

        .result-title {
            font-size: 15px;
            font-weight: 800;
        }

        .result-message {
            font-size: 13px;
            color: var(--text-sub);
            text-align: right;
        }

        .result.success .result-title {
            color: var(--success);
        }

        .result.error .result-title {
            color: var(--error);
        }

        .result.warning .result-title {
            color: var(--warning);
        }

        .result.loading .result-title {
            color: var(--info);
        }

        .result-body {
            padding: 18px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat {
            padding: 15px;
            border-radius: 14px;
            background: var(--soft);
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            line-height: 1;
            font-weight: 800;
            color: #111827;
        }

        .fail-box {
            display: none;
            margin-top: 16px;
            padding: 14px;
            border-radius: 14px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
        }

        .fail-title {
            margin-bottom: 10px;
            color: #c2410c;
            font-weight: 800;
            font-size: 14px;
        }

        .fail-list {
            margin: 0;
            padding-left: 18px;
            color: #9a3412;
            font-size: 13px;
            line-height: 1.7;
            max-height: 190px;
            overflow: auto;
        }

        .loading-line {
            display: none;
            align-items: center;
            gap: 10px;
            color: var(--info);
            font-size: 14px;
        }

        .spinner {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid #93c5fd;
            border-top-color: var(--info);
            animation: spin 0.8s linear infinite;
        }

        .tips {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            color: #64748b;
            font-size: 13px;
            line-height: 1.7;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            h1 {
                font-size: 25px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .path-item {
                grid-template-columns: 1fr;
                gap: 6px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="title-wrap">
            <h1>鼓机文件压缩复制</h1>
            <p class="sub-title">一键复制 bin 文件，并将 mp3 自动压缩到 1MB 以下</p>
        </div>
        <div class="badge">BIN + MP3</div>
    </div>

    <div class="path-box">
        <div class="path-item">
            <div class="path-label">源目录</div>
            <div class="path-value">D:\Code\python\autoCopy\dist\drumFiles</div>
        </div>

        <div class="path-item">
            <div class="path-label">输出目录</div>
            <div class="path-value">D:\Downloads\压缩</div>
        </div>

        <div class="path-item">
            <div class="path-label">FFmpeg</div>
            <div class="path-value">D:\Code\ffmpeg\bin</div>
        </div>
    </div>

    <div class="action-row">
        <button id="startBtn">开始处理</button>
    </div>

    <div id="result" class="result">
        <div class="result-head">
            <div id="resultTitle" class="result-title">等待处理</div>
            <div id="resultMessage" class="result-message"></div>
        </div>

        <div class="result-body">
            <div id="loadingLine" class="loading-line">
                <span class="spinner"></span>
                <span>正在处理文件，mp3 压缩可能需要一些时间...</span>
            </div>

            <div id="stats" class="stats">
                <div class="stat">
                    <div class="stat-label">bin 复制数量</div>
                    <div id="binCount" class="stat-value">0</div>
                </div>

                <div class="stat">
                    <div class="stat-label">mp3 处理数量</div>
                    <div id="mp3Count" class="stat-value">0</div>
                </div>

                <div class="stat">
                    <div class="stat-label">失败数量</div>
                    <div id="failCount" class="stat-value">0</div>
                </div>
            </div>

            <div id="failBox" class="fail-box">
                <div class="fail-title">失败详情</div>
                <ul id="failList" class="fail-list"></ul>
            </div>
        </div>
    </div>

    <div class="tips">
        说明：后端固定读取 drumFiles 目录；bin 文件直接复制；mp3 文件会通过 ffmpeg 压缩后输出到目标目录。
    </div>
</div>

<script>
    const API_URL = '/tool/compress';

    const startBtn = document.getElementById('startBtn');
    const result = document.getElementById('result');
    const resultTitle = document.getElementById('resultTitle');
    const resultMessage = document.getElementById('resultMessage');
    const loadingLine = document.getElementById('loadingLine');

    const binCount = document.getElementById('binCount');
    const mp3Count = document.getElementById('mp3Count');
    const failCount = document.getElementById('failCount');

    const failBox = document.getElementById('failBox');
    const failList = document.getElementById('failList');

    function resetResult() {
        result.style.display = 'block';
        result.className = 'result loading';

        resultTitle.textContent = '正在处理';
        resultMessage.textContent = '请不要重复点击';

        loadingLine.style.display = 'flex';

        binCount.textContent = '0';
        mp3Count.textContent = '0';
        failCount.textContent = '0';

        failBox.style.display = 'none';
        failList.innerHTML = '';
    }

    function renderResult(resp) {
        const data = resp.data || {};
        const fails = data.failMessages || [];
        const hasFail = Number(data.failCount || 0) > 0;

        loadingLine.style.display = 'none';

        binCount.textContent = data.binCopyCount || 0;
        mp3Count.textContent = data.mp3ProcessCount || 0;
        failCount.textContent = data.failCount || 0;

        if (resp.code === 200 && !hasFail) {
            result.className = 'result success';
            resultTitle.textContent = '处理成功';
            resultMessage.textContent = resp.message || '处理完成';
        } else if (resp.code === 200 && hasFail) {
            result.className = 'result warning';
            resultTitle.textContent = '部分完成';
            resultMessage.textContent = resp.message || '处理完成，但存在失败文件';
        } else {
            result.className = 'result error';
            resultTitle.textContent = '处理失败';
            resultMessage.textContent = resp.message || '操作失败';
        }

        if (fails.length > 0) {
            failBox.style.display = 'block';
            failList.innerHTML = '';

            fails.forEach(function (item) {
                const li = document.createElement('li');
                li.textContent = item;
                failList.appendChild(li);
            });
        } else {
            failBox.style.display = 'none';
            failList.innerHTML = '';
        }
    }

    function renderError(err) {
        loadingLine.style.display = 'none';

        result.className = 'result error';
        resultTitle.textContent = '请求异常';
        resultMessage.textContent = String(err || '未知异常');

        binCount.textContent = '0';
        mp3Count.textContent = '0';
        failCount.textContent = '0';

        failBox.style.display = 'none';
        failList.innerHTML = '';
    }

    startBtn.addEventListener('click', function () {
        startBtn.disabled = true;
        resetResult();

        fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(function (res) {
                return res.json();
            })
            .then(function (resp) {
                renderResult(resp);
            })
            .catch(function (err) {
                renderError(err);
            })
            .finally(function () {
                startBtn.disabled = false;
            });
    });
</script>

</body>
</html>
